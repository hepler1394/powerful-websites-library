<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#dc2626">
  <meta name="robots" content="noindex">
  <title>Page Not Found — Powerful Free Websites Library</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjZGMyNjI2Ii8+PHBvbHlnb24gcG9pbnRzPSIzNSwyNSA3NSw1MCAzNSw3NSIgZmlsbD0id2hpdGUiLz48L3N2Zz4=">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e8e8f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      padding-left: max(2rem, env(safe-area-inset-left));
      padding-right: max(2rem, env(safe-area-inset-right));
    }
    .code {
      font-size: clamp(4rem, 20vw, 8rem);
      font-weight: 900;
      color: #dc2626;
      line-height: 1;
    }
    h1 { font-size: clamp(1.2rem, 5vw, 1.8rem); margin: 1rem 0 0.5rem; }
    p { color: #8a8a9a; margin-bottom: 2rem; }
    a.btn {
      display: inline-block;
      background: #dc2626;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 0.9rem 1.8rem;
      border-radius: 12px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    a.btn:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  </style>
</head>

<body>
  <main>
    <div class="code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The link may be broken, or the page may have moved.</p>
    <a class="btn" href="/">Back to the Library</a>
  </main>
</body>

</html>
